      <!--
        Photo gallery:
        - Reorder photos by moving whole .gallery-item blocks.
        - Change data-title to update the lightbox title.
        - Change img src/alt to swap the image and accessibility description.
        - Add new Japan files to images/japan/ before referencing them here.
      -->
      <section class="gallery photo-detail-gallery" aria-label="Japan photography gallery">
        <button class="gallery-item" type="button" data-title="Street Restaurant" data-type="Photography">
          <img src="images/japan/Street Restaurant.jpg" alt="Busy Japanese street restaurant seen through the open front" />

        <button class="gallery-item" type="button" data-title="Pink Taxi Driver" data-type="Photography">

          <img src="images/japan/Street Vending Machine.jpg" alt="Lit vending machine on a Japanese street at night" />
          <span>View fullsize</span>
        </button>
        <button class="gallery-item" type="button" data-title="Tokyo Temple" data-type="Photography">
          <img src="images/japan/Tokyo Temple.jpg" alt="Historic Tokyo temple building beside water and trees" />
          <span>View fullsize</span>
        </button>
        <button class="gallery-item" type="button" data-title="Tokyo Tower" data-type="Photography">
          <img src="images/japan/Tokyo Tower.jpg" alt="Tokyo Tower rising into a partly cloudy sky" />
